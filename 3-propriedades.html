<!DOCTYPE html>

<html lang='en'>
  <head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Propriedades de Componentes</title>
    <link rel='stylesheet' href='main.css'>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const buttonStyleVarients = {
        primary: "bg-rose-400",
        success: "bg-green-400",
        danger: "bg-red-400",
      }

      function Button({ children, variant = "primary", classname, ...props }) {
        return (
          <button
            className={
              `${buttonStyleVarients[variant]} text-white font-medium py-2 px-8 rounded-lg max-w-fit
              hover:opacity-90 transition-opacity duration-300
              ${classname}`
            }
            {...props}
          >
            {children}
          </button>
        )
      }

      function App() {
        return (
          <main className="p-3 flex flex-col gap-4">
            <h1 className="text-2xl font-bold mb-4">Componente:</h1>
            <Button title="Botão 1" classname="m-20">Botão 1</Button>
            <Button variant="success">Botão 2</Button>
            <Button variant="danger">Botão 3</Button>
          </main>
        )
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));

      root.render(
        <App />
      );
    </script>
  </body>
</html>
