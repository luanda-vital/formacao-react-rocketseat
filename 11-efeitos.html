<!DOCTYPE html>

<html lang='en'>
  <head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
    <link rel='stylesheet' href='main.css'>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      function Counter() {
        const [counter, setCounter] = React.useState(0);
        const [name, setName] = React.useState("");
        
        React.useEffect(() => {
          console.log("Componente montado")

          return () => {
            console.log("Componente desmontado")
          }
        }, []);

        React.useEffect(() => {
          if(counter!=0) {
            console.log("Contador atualizado: " + counter)
          }
        }, [counter]);

        React.useEffect(() => {
          console.log("Contador ou nome atualizados")
        }, [counter, name]);

        return (
          <>
            <div>
              <label>Nome:</label>
              <input onChange={(e) => setName(e.target.value)}/>
            </div>

            <p>Contador: {counter}</p>
            
            <button type="button" onClick={() => setCounter((prevvalue) => prevvalue + 1)}>
              Incrementar
            </button>

            <button type="button" onClick={() => setCounter((prevvalue) => prevvalue - 1)}>
              Decrementar
            </button>

            <button type="button" onClick={() => setCounter(0)}>
              Resetar
            </button>
          </>
        )
      }

      function App() {
        const [show, setShow] = React.useState(true);
        return (
          <main>
            <button onClick={() => setShow(!show)}>Mostra/Ocultar Contador</button>
            <hr/>
            {
              show &&
              <Counter />
            }
          </main>
        )
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />)
    </script>
  </body>
</html>
